<body>

    <div id="main">
        <h1>Discover The Weather In Your City</h1>
        <img src="./weather.png" alt="">
        <p>Get To know your weather maps and radar precicption forcast</p>
        <button id="getbtn">GET STARTED</button>
    </div>


    <div id="weather" style="display: none;">
        <nav>
            <div id="leftbtn">
                <i class="ri-arrow-left-wide-fill"></i>
                <div>Weather</div>
            </div>
            <div>
                <i class="ri-more-fill"></i>
            </div>
        </nav>

        <div id="input">
            <input autocomplete="off" type="text" id="cityInput" placeholder="Enter city name">
            <button id="SearchBtn" type="submit"><i class="ri-search-2-line"></i><span>Search</span></button>
        </div>


        <div id="data" style="display: none;">
            <h1>Location</h1>
            <h2>19.</h2>
            <div id="imgdiv"><img src="weather.png" alt=""></div>
            <h3>Mostly Clear</h3>
            <div id="forecast">Forecast</div>
        </div>

    </div>
